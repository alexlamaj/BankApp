<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/app/styles.css">
    <title>App - BankApp</title>
</head>
<body class="body">

    <!-- Header -->
    <header class="header--tag hidden">

        <div class="header">

            <div class="header--content">

                <img src="../images/left--arrow.svg" alt="Go Back" class="icon">

                <img src="../images/bankapp_logo_light.png" alt="BankApp Logo" style="width: 175px;">

                <div class="actions">

                    <div class="box transfer">

                        <div class="action--title">Transfer Money</div>

                        <div class="action--el">
                            <input class="input--action input--username" type="text">
                            <input class="input--action input--amount" type="text">
                            <button class="btn--action btn--transfer"><img src="../images/right--arrow.svg" alt="Enter" style="width: 20px; height: 20px;"></button>
                        </div>

                    </div>

                    <div class="box loan">

                        <div class="action--title">Request Loan</div>

                        <div class="action--el">
                            <input class="input--action input--loan" type="text">
                            <button class="btn--action btn--loan"><img src="../images/right--arrow.svg" alt="Enter" style="width: 20px; height: 20px;"></button>
                        </div>

                    </div>

                    <div class="box close">

                        <div class="action--title">Close Account</div>

                        <div class="action--el">
                            <input class="input--action input--close" type="text">
                            <input class="input--action input--password" type="password">
                            <button class="btn--action btn--close"><img src="../images/right--arrow.svg" alt="Enter" style="width: 20px; height: 20px;"></button>
                        </div>

                    </div>

                </div>

                <div class="links">
                    <a class="link" id="logout" href="">Log Out</a>
                    <a class="link" href="/index.html">Go to Starting Page</a>
                </div>

            </div>

        </div>

    </header>

    <main class="main">

        <!-- Login -->
        <div class="login">

            <img src="../images/bankapp_logo_light.png" alt="BankApp logo" style="width: 200px;">

            <div class="login--title">Login to your BankApp Account</div>

            <form>
                
                <div class="login--el">
                    <label class="input--label" for="username">Username</label>
                    <input class="input input--user" type="text">
                </div>

                <div class="login--el">
                    <label class="input--label" for="password">PIN Password</label>
                    <input class="input input--pin" type="password" maxlength="4">
                </div>

                <button class="login--btn">Login</button>

            </form>

        </div>

    </main>

    <!-- App Component -->
    <div class="app hidden">

        <div class="app--content">

            <div class="open--actions">
                <img src="../images/hamburger.svg" alt="Menu Icon" class="open--icon">
                <div class="open--text">Actions</div>
            </div>

            <div class="main--text">
                <div class="welcome">Welcome back, User</div>
                <div class="balance">EUR 25384.90</div>
            </div>

            <div class="dash">

                <div class="movements">

                    <div class="move">

                        <div class="move--el">
                            <div class="move--type type--deposit">Deposit</div>
                            <div class="date">25/7/2024</div>
                        </div>

                        <div class="move--value">2890</div>

                    </div>

                    <div class="move">

                        <div class="move--el">
                            <div class="move--type type--withdrawal">Withdrawal</div>
                            <div class="date">25/7/2024</div>
                        </div>

                        <div class="move--value">- 2890</div>

                    </div>

                    <div class="move">

                        <div class="move--el">
                            <div class="move--type type--loan">Loan</div>
                            <div class="date">25/7/2024</div>
                        </div>

                        <div class="move--value">2890</div>

                    </div>

                </div>

                <div class="summary">

                    <div class="sum--content">
                        <div class="sum--title">Incomes</div>
                        <div class="sum--value incomes">2830</div>
                    </div>

                    <div class="sum--content">
                        <div class="sum--title">Outcomes</div>
                        <div class="sum--value outcomes">2803</div>
                    </div>

                    <div class="sum--content">
                        <div class="sum--title">Interest %</div>
                        <div class="sum--value interest">12.4</div>
                    </div>

                    <div class="time">
                        <div class="time--text">Time Left to Logout</div>
                        <div class="timer">00:00</div>
                    </div>

                </div>

            </div>

        </div>

    </div>
    
    <script src="app/script.js" defer></script>
    
</body>
</html>
